aid: merbridge
name: Merbridge
description: >-
  Merbridge is an open source, eBPF-based service mesh acceleration tool that
  replaces iptables rules with eBPF traffic interception and uses msg_redirect
  to shorten the datapath between sidecars and services. It is a CNCF Sandbox
  project and supports Istio, Linkerd2, and Kuma.
